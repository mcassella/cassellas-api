apiVersion: apps/v1
kind: Deployment
metadata:
  name: cassellas-api
  namespace: cassellas-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cassellas-api
  template:
    metadata:
      labels:
        app: cassellas-api
    spec:
      containers:
        - name: cassellas-api
          image: APP_IMAGE
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi