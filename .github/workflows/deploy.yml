name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner }}/cassellas-api
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Normalize image repository
        id: image
        shell: bash
        run: |
          image_repo="${IMAGE_REPOSITORY,,}"
          echo "repository=$image_repo" >> "$GITHUB_OUTPUT"
          echo "image_uri=$image_repo:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image_uri }}
            ${{ steps.image.outputs.repository }}:latest

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Fetch GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.GKE_CLUSTER }}
          location: ${{ vars.GKE_LOCATION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Render manifests
        shell: bash
        run: |
          cp -R k8s /tmp/k8s
          sed -i "s|GHCR_IMAGE|${{ steps.image.outputs.repository }}|g" /tmp/k8s/overlays/prod/kustomization.yaml
          sed -i "s|IMAGE_TAG|${GITHUB_SHA}|g" /tmp/k8s/overlays/prod/kustomization.yaml

      - name: Deploy to GKE
        run: kubectl apply -k /tmp/k8s/overlays/prod

      - name: Wait for rollout
        run: kubectl rollout status deployment/cassellas-api --namespace cassellas-api --timeout=180s