name: Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: Executa o deploy para HML AWS e, apos aprovacao, para Producao GCP
        required: true
        default: false
        type: boolean
      promote_prod:
        description: Promove para Producao GCP apos deploy em HML
        required: true
        default: true
        type: boolean
      strict_hml_smoke:
        description: Falha o job se o healthcheck de HML nao responder
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: pytest -q

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit

      - name: Static security scan (warn-only)
        shell: bash
        run: |
          if bandit -r main.py; then
            echo "No static security findings from bandit."
          else
            echo "::warning::bandit reported findings. Security check is warn-only and did not block the pipeline."
          fi

      - name: Dependency vulnerability scan (warn-only)
        shell: bash
        run: |
          if pip-audit -r requirements.txt; then
            echo "No known dependency vulnerabilities found."
          else
            echo "::warning::pip-audit found vulnerabilities. Security check is warn-only and did not block the pipeline."
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, security]
    outputs:
      image_repository: ${{ steps.meta.outputs.image_repository }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_uri: ${{ steps.meta.outputs.image_uri }}
      should_push: ${{ steps.push_gate.outputs.should_push }}
    env:
      IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner }}/cassellas-api
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Normalize image metadata
        id: meta
        shell: bash
        run: |
          image_repository="${IMAGE_REPOSITORY,,}"
          image_tag="${GITHUB_SHA}"
          echo "image_repository=$image_repository" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "image_uri=$image_repository:$image_tag" >> "$GITHUB_OUTPUT"

      - name: Decide if image push is enabled
        id: push_gate
        shell: bash
        run: |
          should_push="false"
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            should_push="true"
          fi
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            should_push="true"
          fi
          echo "should_push=$should_push" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: steps.push_gate.outputs.should_push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.push_gate.outputs.should_push == 'true' }}
          tags: |
            ${{ steps.meta.outputs.image_uri }}
            ${{ steps.meta.outputs.image_repository }}:latest

  deploy_aws_hml:
    name: Deploy AWS HML
    needs: [build]
    if: github.event_name == 'workflow_dispatch' && inputs.deploy == true && needs.build.outputs.should_push == 'true'
    runs-on: [self-hosted, linux, ARM64, wsl, minikube]
    environment:
      name: aws-hml
      url: https://hml-api.cassellas.com.br
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Select AWS HML Kubernetes context
        if: vars.AWS_HML_KUBE_CONTEXT != ''
        shell: bash
        run: kubectl config use-context "${{ vars.AWS_HML_KUBE_CONTEXT }}"

      - name: Validate Kubernetes context
        shell: bash
        run: |
          kubectl config current-context
          kubectl get nodes

      - name: Render HML manifests
        shell: bash
        run: |
          rm -rf /tmp/k8s
          cp -R k8s /tmp/k8s
          sed -i "s|GHCR_IMAGE|${{ needs.build.outputs.image_repository }}|g" /tmp/k8s/overlays/aws-hml/kustomization.yaml
          sed -i "s|IMAGE_TAG|${{ needs.build.outputs.image_tag }}|g" /tmp/k8s/overlays/aws-hml/kustomization.yaml

      - name: Deploy to AWS HML
        run: kubectl apply -k /tmp/k8s/overlays/aws-hml

      - name: Wait for rollout (HML)
        run: kubectl rollout status deployment/cassellas-api --namespace cassellas-api --timeout=180s

      - name: Smoke test HML
        shell: bash
        run: |
          hml_ok="false"
          for i in {1..30}; do
            if curl -fsS --max-time 10 https://hml-api.cassellas.com.br/healthz >/dev/null; then
              echo "HML endpoint healthy on attempt ${i}."
              hml_ok="true"
              break
            fi
            echo "HML not ready yet (attempt ${i}/30)."
            sleep 10
          done

          if [[ "$hml_ok" == "true" ]]; then
            exit 0
          fi

          echo "HML healthcheck failed after retries. Last response details:"
          curl -sS -o /tmp/hml_body.txt -D /tmp/hml_headers.txt --max-time 15 https://hml-api.cassellas.com.br/healthz || true
          echo "--- headers ---"
          cat /tmp/hml_headers.txt || true
          echo "--- body ---"
          cat /tmp/hml_body.txt || true

          if [[ "${{ inputs.strict_hml_smoke }}" == "true" ]]; then
            echo "Strict HML smoke mode enabled: failing job."
            exit 1
          fi

          echo "::warning::HML healthcheck did not pass, but strict_hml_smoke=false so deployment job will continue."

  deploy_gcp_prod:
    name: Deploy GCP Production
    runs-on: ubuntu-latest
    needs: [build, deploy_aws_hml]
    if: github.event_name == 'workflow_dispatch' && inputs.deploy == true && inputs.promote_prod == true && needs.build.outputs.should_push == 'true'
    environment:
      name: gcp-prod
      url: https://api.cassellas.com.br
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Fetch GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.GKE_CLUSTER || 'gke-economico' }}
          location: ${{ vars.GKE_LOCATION || 'us-central1-a' }}
          project_id: ${{ vars.GCP_PROJECT_ID || 'project-35924d4e-e4d4-4fb6-92e' }}

      - name: Render production manifests
        shell: bash
        run: |
          rm -rf /tmp/k8s
          cp -R k8s /tmp/k8s
          sed -i "s|GHCR_IMAGE|${{ needs.build.outputs.image_repository }}|g" /tmp/k8s/overlays/prod/kustomization.yaml
          sed -i "s|IMAGE_TAG|${{ needs.build.outputs.image_tag }}|g" /tmp/k8s/overlays/prod/kustomization.yaml

      - name: Deploy to GKE
        run: kubectl apply -k /tmp/k8s/overlays/prod

      - name: Wait for rollout (Production)
        run: kubectl rollout status deployment/cassellas-api --namespace cassellas-api --timeout=180s
