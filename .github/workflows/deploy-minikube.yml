name: Deploy Minikube

on:
  workflow_dispatch:
    inputs:
      api_name:
        description: Nome da API para rota /API/<api_name>/now
        required: true
        default: cassellas-api

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_repo: ${{ steps.meta.outputs.image_repo }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v7

      - id: meta
        shell: bash
        run: |
          repo="ghcr.io/${GITHUB_REPOSITORY_OWNER}/cassellas-api"
          repo="${repo,,}"
          echo "image_repo=$repo" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_repo }}:latest

  deploy:
    needs: build
    runs-on: [self-hosted, linux, ARM64, wsl, minikube]
    steps:
      - uses: actions/checkout@v7

      - name: Validar contexto Kubernetes
        run: |
          kubectl config current-context
          kubectl get nodes

      - name: Renderizar e aplicar manifests
        shell: bash
        env:
          IMAGE_REPO: ${{ needs.build.outputs.image_repo }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          API_NAME: ${{ inputs.api_name }}
        run: |
          rm -rf /tmp/k8s
          cp -R k8s /tmp/k8s
          sed -i "s|GHCR_IMAGE|${IMAGE_REPO}|g" /tmp/k8s/overlays/minikube/kustomization.yaml
          sed -i "s|IMAGE_TAG|${IMAGE_TAG}|g" /tmp/k8s/overlays/minikube/kustomization.yaml
          kubectl apply -k /tmp/k8s/overlays/minikube

          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Service
          metadata:
            name: cassellas-api-bridge
            namespace: cattle-system
          spec:
            type: ExternalName
            externalName: cassellas-api.cassellas-api.svc.cluster.local
            ports:
              - name: http
                port: 80
                targetPort: 80
          EOF

          if kubectl -n cattle-system get ingress rancher-ingress >/dev/null 2>&1 && kubectl -n cattle-system get ingress rancher >/dev/null 2>&1; then
            kubectl -n cattle-system delete ingress rancher --ignore-not-found
          fi

          RANCHER_INGRESS="rancher-ingress"
          if ! kubectl -n cattle-system get ingress "${RANCHER_INGRESS}" >/dev/null 2>&1; then
            RANCHER_INGRESS="rancher"
          fi

          API_PATH="/API/${API_NAME}"
          if kubectl -n cattle-system get ingress "${RANCHER_INGRESS}" -o jsonpath='{range .spec.rules[?(@.host=="mini.cassellas.com.br")].http.paths[*]}{.path}{"=>"}{.backend.service.name}{"\n"}{end}' | grep -q "^${API_PATH}=>cassellas-api-bridge$"; then
            echo "Ingress path ${API_PATH} already present on rancher ingress"
          else
            kubectl -n cattle-system patch ingress "${RANCHER_INGRESS}" --type='json' -p="[{\"op\":\"add\",\"path\":\"/spec/rules/0/http/paths/-\",\"value\":{\"path\":\"${API_PATH}\",\"pathType\":\"Prefix\",\"backend\":{\"service\":{\"name\":\"cassellas-api-bridge\",\"port\":{\"number\":80}}}}}]"
          fi

          kubectl -n cassellas-api set env deployment/cassellas-api API_NAME="${API_NAME}"
          kubectl rollout status deployment/cassellas-api -n cassellas-api --timeout=180s